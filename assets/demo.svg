<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">

  <style>
    .mono { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
    .ui   { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; }
  </style>

  <!-- background -->
  <rect width="720" height="360" rx="10" fill="#1e1e2e"/>

  <!-- title bar -->
  <rect width="720" height="32" rx="10" fill="#313244"/>
  <rect y="16" width="720" height="16" fill="#313244"/>
  <circle cx="22" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="42" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="62" cy="16" r="6" fill="#a6e3a1"/>
  <text class="ui" x="360" y="21" text-anchor="middle" fill="#6c7086">spare — sparse file demo</text>

  <!-- ── L1  ❯ ls -lh vm.qcow2  (t = 0.5 s) ── -->
  <text class="mono" x="20" y="68" opacity="0">
    <tspan fill="#89b4fa">❯ </tspan><tspan fill="#cdd6f4">ls -lh vm.qcow2</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.030; 0.036; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L2  ls output  (t = 1.0 s) ── -->
  <text class="mono" x="20" y="88" opacity="0">
    <tspan fill="#a6adc8">-rw-r--r--  ivan  users  </tspan><tspan fill="#f9e2af">4.0G</tspan><tspan fill="#a6adc8">  Jun  8  vm.qcow2</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.064; 0.071; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L3  ❯ spare -S p  (t = 1.8 s) ── -->
  <text class="mono" x="20" y="118" opacity="0">
    <tspan fill="#89b4fa">❯ </tspan><tspan fill="#cdd6f4">spare </tspan><tspan fill="#cba6f7">-S</tspan><tspan fill="#cdd6f4"> p vm.spa vm.qcow2</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.121; 0.129; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- (2 s gap — pack running) -->

  <!-- ── L4  ❯ ls -lh vm.spa  (t = 3.8 s) ── -->
  <text class="mono" x="20" y="158" opacity="0">
    <tspan fill="#89b4fa">❯ </tspan><tspan fill="#cdd6f4">ls -lh vm.spa</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.264; 0.271; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L5  ls output showing 820 M  (t = 4.4 s) ── -->
  <text class="mono" x="20" y="178" opacity="0">
    <tspan fill="#a6adc8">-rw-r--r--  ivan  users  </tspan><tspan fill="#a6e3a1">820M</tspan><tspan fill="#a6adc8">  Jun  8  vm.spa</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.307; 0.314; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L6  annotation  (t = 5.0 s) ── -->
  <text class="mono" x="20" y="198" opacity="0">
    <tspan fill="#89dceb">  ↳ </tspan><tspan fill="#f9e2af">4.0 GB</tspan><tspan fill="#89dceb"> → </tspan><tspan fill="#a6e3a1">820 MB</tspan><tspan fill="#89dceb">  ·  real data only, holes skipped</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.350; 0.357; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L7  ❯ spare -S u  (t = 5.8 s) ── -->
  <text class="mono" x="20" y="228" opacity="0">
    <tspan fill="#89b4fa">❯ </tspan><tspan fill="#cdd6f4">spare </tspan><tspan fill="#cba6f7">-S</tspan><tspan fill="#cdd6f4"> u vm.spa</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.407; 0.414; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- (3.2 s gap — unpack running) -->

  <!-- ── L8  ❯ ls -lh vm.qcow2  (t = 9.0 s) ── -->
  <text class="mono" x="20" y="278" opacity="0">
    <tspan fill="#89b4fa">❯ </tspan><tspan fill="#cdd6f4">ls -lh vm.qcow2</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.629; 0.636; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L9  ls output showing 4.0 G restored  (t = 9.6 s) ── -->
  <text class="mono" x="20" y="298" opacity="0">
    <tspan fill="#a6adc8">-rw-r--r--  ivan  users  </tspan><tspan fill="#a6e3a1">4.0G</tspan><tspan fill="#a6adc8">  Jun  8  vm.qcow2</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.671; 0.679; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L10  annotation  (t = 10.2 s) ── -->
  <text class="mono" x="20" y="318" opacity="0">
    <tspan fill="#89dceb">  ↳ fully restored  ·  sparse holes recreated</tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.714; 0.721; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- ── L11  idle prompt + blinking cursor  (t = 10.8 s) ── -->
  <text class="mono" x="20" y="340" opacity="0">
    <tspan fill="#89b4fa">❯ </tspan>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.757; 0.764; 0.920; 0.960; 1"
      values  ="0;   0;   1;   1;   0; 0"/>
  </text>

  <!-- cursor block (blinks 3×, then fades with the rest) -->
  <rect x="36" y="328" width="8" height="13" fill="#cdd6f4" opacity="0">
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      keyTimes="0; 0.757; 0.793; 0.829; 0.865; 0.901; 0.920; 0.960; 1"
      values  ="0;   0;   1;   0;   1;   0;   0;   0; 0"/>
  </rect>

</svg>
